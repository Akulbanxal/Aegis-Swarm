[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

[profile.default.fuzz]
runs = 256
seed = "0xdeadbeef"

[profile.ci.fuzz]
runs = 1000

[rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC_URL}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC_URL}"
localhost      = "http://127.0.0.1:8545"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_API_KEY}", url = "${SOMNIA_EXPLORER_URL}/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
